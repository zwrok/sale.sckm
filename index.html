<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Rezerwacja Sal — SCKM</title>
  <style>
    :root {
      --bg:#0f0f0f; --sur:#1a1a1a; --sur2:#242424;
      --bd:rgba(255,255,255,.12); --txt:#f0ede8;
      --mut:#777; --acc:#c8b87e; --grn:#7ec87e; --red:#c85050;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:var(--bg); color:var(--txt);
      font-family:'Syne',sans-serif; overscroll-behavior:none; }
    #frame-wrap { display:none; position:fixed; inset:0; }
    #frame-wrap.show { display:block; }
    iframe {
      width:100%; height:100%; border:none; display:block;
      /* Fix podwójnego kliknięcia na iOS/Android */
      pointer-events:auto;
      touch-action:auto;
    }

    /* Ekran logowania */
    #auth { position:fixed; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:1.5rem; gap:1.4rem; background:var(--bg); }
    #auth.hide { display:none; }
    .logo { font-size:1.6rem; font-weight:800; letter-spacing:-.03em; text-align:center; }
    .logo em { color:var(--acc); font-style:normal; }
    .logo sub { display:block; font-family:'DM Mono',monospace; font-size:.58rem; color:var(--mut);
      letter-spacing:.08em; text-transform:uppercase; margin-top:4px; font-weight:400; }
    .card { background:var(--sur); border:1px solid var(--bd); border-radius:12px; padding:1.6rem;
      width:100%; max-width:340px; display:flex; flex-direction:column; gap:1rem; }
    .card-title { font-family:'DM Mono',monospace; font-size:.62rem; text-transform:uppercase;
      letter-spacing:.08em; color:var(--mut); text-align:center; }
    .inp-wrap { display:flex; flex-direction:column; gap:6px; }
    .inp-wrap label { font-family:'DM Mono',monospace; font-size:.56rem;
      text-transform:uppercase; letter-spacing:.06em; color:var(--mut); }
    input[type=password] { width:100%; background:var(--sur2); border:1px solid var(--bd);
      border-radius:7px; color:var(--txt); font-family:'DM Mono',monospace; font-size:.9rem;
      padding:11px 14px; outline:none; letter-spacing:.12em; transition:border-color .15s;
      -webkit-appearance:none; }
    input[type=password]:focus { border-color:var(--acc); }
    .err { font-family:'DM Mono',monospace; font-size:.6rem; color:var(--red);
      text-align:center; min-height:1em; transition:opacity .2s; }
    .err.hide { opacity:0; }
    .btn-login { background:var(--acc); color:#000; border:none; border-radius:8px; padding:12px;
      font-family:'Syne',sans-serif; font-weight:800; font-size:.9rem; cursor:pointer; width:100%;
      transition:opacity .12s; -webkit-tap-highlight-color:transparent; }
    .btn-login:hover,.btn-login:active { opacity:.85; }
    .divider { display:flex; align-items:center; gap:8px; font-family:'DM Mono',monospace;
      font-size:.54rem; color:var(--mut); }
    .divider::before,.divider::after { content:''; flex:1; border-top:1px solid rgba(255,255,255,.08); }
    /* Przycisk widoku publicznego — subtelny, ale czytelny */
    .btn-pub { background:none; border:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.5);
      border-radius:8px; padding:10px; font-family:'DM Mono',monospace; font-size:.64rem;
      cursor:pointer; width:100%; text-align:center; transition:all .15s;
      -webkit-tap-highlight-color:transparent; }
    .btn-pub:hover,.btn-pub:active { border-color:rgba(255,255,255,.25); color:var(--txt); }
    .pub-note { font-family:'DM Mono',monospace; font-size:.52rem;
      color:rgba(255,255,255,.25); text-align:center; line-height:1.6; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>

<div id="auth">
  <div class="logo">Rezerwacja <em>Sal</em><sub>SCKM — Kraków</sub></div>
  <div class="card">
    <div class="card-title">Zaloguj się</div>
    <div class="inp-wrap">
      <label>Hasło pracownika SCKM</label>
      <input type="password" id="pwd" placeholder="••••••••"
        autocomplete="current-password"
        onkeydown="if(event.key==='Enter') login()">
    </div>
    <div class="err hide" id="err">Nieprawidłowe hasło.</div>
    <button class="btn-login" onclick="login()">Zaloguj →</button>
    <div class="divider">lub</div>
    <!-- Zmieniony tekst: bez "bez hasła", bardziej neutralny -->
    <button class="btn-pub" onclick="goPublic()">Przeglądaj harmonogram →</button>
    <div class="pub-note">widok publiczny · bez danych osobowych</div>
  </div>
</div>

<div id="frame-wrap">
  <iframe id="frame" src="" allow="fullscreen"></iframe>
</div>

<script>
  // ══════════════════════════════════════════════
  //  KONFIGURACJA
  // ══════════════════════════════════════════════

  // 1. Wklej URL swojego Apps Script Web App:
  const APP_URL = 'WKLEJ_TUTAJ_URL_APPS_SCRIPT';

  // 2. Hash SHA-256 hasła. Domyślne: sckm2026
  //    Zmień na: https://emn178.github.io/online-tools/sha256.html
  const PASS_HASH = '2de3ec165735b2e21f5a57d287a725c3d6d4a7c837038e20b4761f8fe5055f9b';

  // ══════════════════════════════════════════════

  async function sha256(msg) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }

  async function login() {
    const pwd = document.getElementById('pwd').value;
    if (!pwd) return;
    const hash = await sha256(pwd);
    if (hash === PASS_HASH) {
      sessionStorage.setItem('sckm_ok','1');
      showApp(false); // false = tryb pracownika (pełny)
    } else {
      const err = document.getElementById('err');
      err.classList.remove('hide');
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
      setTimeout(()=>err.classList.add('hide'), 3000);
    }
  }

  function goPublic() {
    sessionStorage.removeItem('sckm_ok');
    showApp(true); // true = tryb publiczny (bez nazwisk)
  }

  function showApp(isPublic) {
    const frame = document.getElementById('frame');
    frame.src = APP_URL + (isPublic ? '?mode=public' : '');
    document.getElementById('auth').classList.add('hide');
    document.getElementById('frame-wrap').classList.add('show');

    // Gdy iframe się załaduje — wyślij tryb i nadaj focus
    frame.onload = () => {
      // Tryb publiczny/pracownik
      frame.contentWindow.postMessage(
        { type: 'sckm_mode', public: isPublic },
        '*'
      );
      // Focus na iframe — eliminuje konieczność podwójnego kliknięcia
      frame.focus();
    };
  }

  window.onload = () => {
    if (sessionStorage.getItem('sckm_ok') === '1') showApp(false);
  };
</script>
</body>
</html>
