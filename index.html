<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dostępność Sal — SCKM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #191919;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --text: #f0ede8;
    --muted: #777;
    --muted2: #555;
    --green: #7ec87e;
    --green-dim: rgba(126,200,126,0.12);
    --red: #d95f5f;
    --accent: #c8b87e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 1.8rem 2.5rem 1.4rem;
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .logo h1 { font-size: clamp(1.5rem, 3.5vw, 2.2rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .logo h1 em { color: var(--accent); font-style: normal; }
  .logo p { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); margin-top: 5px; letter-spacing: 0.06em; text-transform: uppercase; }
  .cta-box {
    background: var(--green-dim);
    border: 1px solid rgba(126,200,126,0.22);
    border-radius: 8px; padding: 10px 16px;
    font-size: 0.82rem; color: var(--green); max-width: 310px; line-height: 1.55;
  }
  .cta-box a {
    color: var(--accent); font-weight: 700; text-decoration: none;
    border-bottom: 1px solid rgba(200,184,126,0.5);
  }
  .cta-box a:hover { opacity: 0.8; }
  .cta-box small { display: block; opacity: 0.65; margin-top: 3px; font-size: 0.75rem; }

  /* ── LEGEND ── */
  .legend-bar {
    padding: 0.7rem 2.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
    font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted);
  }
  .li { display: flex; align-items: center; gap: 6px; }
  .ldot { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

  /* ── MAIN GRID ── */
  main { padding: 1.8rem 2.5rem 3rem; }

  .week-wrap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 14px;
  }

  /* single day column */
  .day-col { display: flex; flex-direction: column; gap: 0; }

  .day-head {
    text-align: center;
    padding-bottom: 10px;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .day-head .dshort { font-size: 0.9rem; font-weight: 700; }
  .day-head .dfull  { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted); letter-spacing: 0.04em; margin-top: 2px; }

  /* room block = label + bar */
  .room-block { margin-bottom: 10px; }
  .room-block:last-child { margin-bottom: 0; }

  .rlabel {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; color: var(--muted);
    margin-bottom: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* the bar itself */
  .bar {
    position: relative;
    height: 36px;
    background: var(--surface);
    border-radius: 5px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* hour ticks inside bar */
  .tick {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: rgba(255,255,255,0.05);
    pointer-events: none;
  }
  /* every 3h tick slightly stronger */
  .tick3 { background: rgba(255,255,255,0.10); }

  /* busy segment */
  .busy {
    position: absolute; top: 3px; bottom: 3px;
    background: var(--red);
    border-radius: 3px;
    opacity: 0.82;
    cursor: default;
    transition: opacity 0.1s;
  }
  .busy:hover { opacity: 1; }

  /* free segment */
  .free {
    position: absolute; top: 3px; bottom: 3px;
    background: var(--green);
    border-radius: 3px;
    opacity: 0.18;
    pointer-events: none;
  }

  /* ── HOUR AXIS ── shared row below grid */
  .axis-wrap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 14px;
    margin-top: 5px;
  }
  .axis {
    position: relative;
    height: 18px;
  }
  .hlabel {
    position: absolute;
    font-family: 'DM Mono', monospace;
    font-size: 0.54rem; color: var(--muted2);
    transform: translateX(-50%);
    white-space: nowrap;
    top: 0;
  }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed; z-index: 200;
    background: #1c1c1c; border: 1px solid var(--border2);
    border-radius: 6px; padding: 5px 11px;
    font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text);
    pointer-events: none; display: none; white-space: nowrap;
  }

  /* ── FOOTER ── */
  footer {
    padding: 1rem 2.5rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted2);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 1100px) {
    .week-wrap, .axis-wrap { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 680px) {
    header, .legend-bar, main, footer { padding-left: 1rem; padding-right: 1rem; }
    .week-wrap, .axis-wrap { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 360px) {
    .week-wrap, .axis-wrap { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Dostępność <em>Sal</em></h1>
    <p>SCKM — rozkład tygodniowy</p>
  </div>
  <div class="cta-box">
    Widzisz wolne okno? Złóż wniosek rezerwacyjny:<br>
    <a href="https://cal.com/wynajmy.sckm/sale" target="_blank">formularz rezerwacji →</a>
    <small>Każda rezerwacja wymaga akceptacji.</small>
  </div>
</header>

<div class="legend-bar">
  <div class="li"><div class="ldot" style="background:var(--red)"></div>sala zajęta</div>
  <div class="li"><div class="ldot" style="background:var(--green);opacity:0.55"></div>sala wolna</div>
  <span style="margin-left:auto">Najedź kursorem na czerwony blok, żeby zobaczyć godziny</span>
</div>

<main>
  <div class="week-wrap" id="week-wrap"></div>
  <div class="axis-wrap" id="axis-wrap"></div>
</main>

<footer>
  <span>Dane: Zajętość Wszystkich Sal · aktualizacja ręczna</span>
  <span id="update-date"></span>
</footer>

<div class="tooltip" id="tooltip"></div>

<script>
// ─────────────────────────────────────────────────
// KONFIGURACJA — edytuj te wartości gdy zmieni się plan zajęć
// Klucze: 0=pon 1=wt 2=śr 3=czw 4=pt 5=sob 6=nd
// Godziny jako liczby dziesiętne: 9.5 = 9:30, 16.25 = 16:15
// ─────────────────────────────────────────────────
const DATA = {
  baletowa: {
    0: [[16.5, 18]],
    1: [[9.5, 11.5]],
    2: [[9.5, 11.5]],
    3: [[9.5, 11.5]],
    4: [[15.5, 20.5]],
    5: [[11, 12.5]],
    6: [[10, 14]],
  },
  galeria: {
    0: [[9, 11.25]],
    1: [[9, 11.25]],
    2: [[9, 11.25], [16.5, 19]],
    3: [[17.5, 19.75]],
    4: [[10, 11.5]],
    5: [[10, 15.25]],
    6: [],
  },
  gimnastyczna: {
    0: [[15, 16.5]],
    1: [[16.5, 18]],
    2: [[16.5, 20.25]],
    3: [[15, 21]],
    4: [[10, 11.5]],
    5: [[9, 12]],
    6: [[9, 12]],
  },
  teatralna: {
    0: [[9, 12]],
    1: [[9, 12]],
    2: [[9.5, 10.25]],
    3: [[10, 11.5]],
    4: [[10, 11.5]],
    5: [],
    6: [],
  },
  plastyczna: {
    0: [[8, 11], [16.5, 19.5]],
    1: [[8.5, 11.5], [15.5, 19.5]],
    2: [[8.5, 14.5], [15.5, 17.75]],
    3: [[16.5, 20]],
    4: [[15.5, 18]],
    5: [],
    6: [],
  },
};

const ROOMS = [
  { key: 'baletowa',     label: 'Baletowa' },
  { key: 'galeria',      label: 'Galeria 17' },
  { key: 'gimnastyczna', label: 'Gimnastyczna' },
  { key: 'teatralna',    label: 'Teatralna p.78' },
  { key: 'plastyczna',   label: 'Plastyczna 83/84' },
];

const DAYS = [
  { short: 'Pon',  full: 'Poniedziałek', key: 0 },
  { short: 'Wt',   full: 'Wtorek',       key: 1 },
  { short: 'Śr',   full: 'Środa',        key: 2 },
  { short: 'Czw',  full: 'Czwartek',     key: 3 },
  { short: 'Pt',   full: 'Piątek',       key: 4 },
  { short: 'Sob',  full: 'Sobota',       key: 5 },
  { short: 'Nd',   full: 'Niedziela',    key: 6 },
];

const WS = 8, WE = 21; // zakres godzin na osi (8:00–21:00)

function pct(h) { return ((h - WS) / (WE - WS)) * 100; }

function fmt(h) {
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  return hh + ':' + String(mm).padStart(2, '0');
}

function getFree(busy) {
  const s = [...busy].sort((a, b) => a[0] - b[0]);
  const free = []; let cur = WS;
  for (const [a, b] of s) {
    if (a > cur + 0.15) free.push([cur, a]);
    cur = Math.max(cur, b);
  }
  if (cur < WE - 0.15) free.push([cur, WE]);
  return free;
}

// tooltip
const tip = document.getElementById('tooltip');
document.addEventListener('mousemove', e => {
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 34) + 'px';
});

// build hour ticks HTML (reused per bar)
function ticksHTML() {
  let h = '';
  for (let i = WS + 1; i < WE; i++) {
    const cls = (i % 3 === 0) ? 'tick tick3' : 'tick';
    h += `<div class="${cls}" style="left:${pct(i)}%"></div>`;
  }
  return h;
}
const TICKS = ticksHTML();

// build axis labels HTML (reused per column)
function axisHTML() {
  let h = '';
  for (let i = WS; i <= WE; i += 2) {
    h += `<span class="hlabel" style="left:${pct(i)}%">${i}:00</span>`;
  }
  return h;
}
const AXIS = axisHTML();

// render
const weekWrap = document.getElementById('week-wrap');
const axisWrap = document.getElementById('axis-wrap');

for (const d of DAYS) {
  let roomsHTML = '';

  for (const r of ROOMS) {
    const busy = DATA[r.key][d.key] || [];
    const free = getFree(busy);

    let segs = TICKS;

    for (const [s, e] of free) {
      segs += `<div class="free" style="left:${pct(s)}%;width:${pct(e)-pct(s)}%"></div>`;
    }
    for (const [s, e] of busy) {
      const tip_txt = `${r.label}  ${fmt(s)} – ${fmt(e)}`;
      segs += `<div class="busy"
        style="left:${pct(s)}%;width:${pct(e)-pct(s)}%"
        onmouseenter="tip.textContent='${tip_txt}';tip.style.display='block'"
        onmouseleave="tip.style.display='none'"></div>`;
    }

    roomsHTML += `<div class="room-block">
      <div class="rlabel">${r.label}</div>
      <div class="bar">${segs}</div>
    </div>`;
  }

  weekWrap.innerHTML += `<div class="day-col">
    <div class="day-head">
      <div class="dshort">${d.short}</div>
      <div class="dfull">${d.full}</div>
    </div>
    ${roomsHTML}
  </div>`;

  axisWrap.innerHTML += `<div class="axis">${AXIS}</div>`;
}

// footer date
document.getElementById('update-date').textContent =
  'Aktualizacja: ' + new Date().toLocaleDateString('pl-PL', { day: '2-digit', month: 'long', year: 'numeric' });
</script>
</body>
</html>
