<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dostępność Sal — SCKM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --text: #f0ede8;
    --muted: #777;
    --muted2: #444;
    --green: #7ec87e;
    --green-dim: rgba(126,200,126,0.12);
    --red: #d95f5f;
    --accent: #c8b87e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1.6rem 2rem 1.3rem;
    display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  }
  .logo h1 { font-size: clamp(1.4rem,3.5vw,2.1rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .logo h1 em { color: var(--accent); font-style: normal; }
  .logo p { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); margin-top: 5px; letter-spacing: 0.06em; text-transform: uppercase; }

  .cta-box {
    background: var(--green-dim);
    border: 1px solid rgba(126,200,126,0.22);
    border-radius: 8px; padding: 10px 16px;
    font-size: 0.8rem; color: var(--green); max-width: 300px; line-height: 1.6;
  }
  .cta-box a { color: var(--accent); font-weight: 700; text-decoration: none; border-bottom: 1px solid rgba(200,184,126,0.5); }
  .cta-box a:hover { opacity: 0.8; }
  .cta-box small { display: block; opacity: 0.6; margin-top: 2px; font-size: 0.7rem; }

  .legend-bar {
    padding: 0.6rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 20px; align-items: center; flex-wrap: wrap;
    font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted);
  }
  .li { display: flex; align-items: center; gap: 5px; }
  .ldot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-bar span:last-child { margin-left: auto; font-size: 0.6rem; opacity: 0.6; }

  /* ── MAIN ── */
  main { padding: 1.5rem 2rem 3rem; }

  /* Each day = heading + table of [label | bar] + one axis row */
  .day-section { margin-bottom: 2.2rem; }

  .day-heading {
    display: flex; align-items: baseline; gap: 10px;
    padding-bottom: 8px; margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .day-short { font-size: 1rem; font-weight: 700; }
  .day-full  { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); }

  /* row = label + bar, using CSS grid so label width is fixed and bar fills rest */
  .row {
    display: grid;
    grid-template-columns: 130px 1fr;
    align-items: center;
    gap: 10px;
    margin-bottom: 7px;
  }
  .rlabel {
    font-family: 'DM Mono', monospace;
    font-size: 0.64rem; color: var(--muted);
    line-height: 1.3; text-align: right;
    padding-right: 4px;
  }

  /* the bar */
  .bar {
    position: relative; height: 34px;
    background: var(--surface);
    border-radius: 5px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .tick  { position: absolute; top:0; bottom:0; width:1px; background: rgba(255,255,255,0.05); pointer-events:none; }
  .tick3 { background: rgba(255,255,255,0.11); }
  .busy  { position: absolute; top:3px; bottom:3px; background: var(--red); border-radius:3px; opacity:0.82; cursor:default; transition: opacity .1s; }
  .busy:hover { opacity:1; }
  .fseg  { position: absolute; top:3px; bottom:3px; background: var(--green); border-radius:3px; opacity:0.16; pointer-events:none; }

  /* axis row — label column empty, axis fills the bar column */
  .axis-row {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 10px;
    margin-top: 3px;
  }
  .axis {
    position: relative; height: 18px;
  }
  .hlabel {
    position: absolute;
    font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--muted2);
    transform: translateX(-50%); white-space: nowrap; top: 0;
    /* clamp left/right so first and last labels don't overflow */
  }
  /* prevent first label from going left of axis */
  .hlabel:first-child  { transform: translateX(0); }
  /* prevent last label from going right of axis */
  .hlabel:last-child   { transform: translateX(-100%); }

  /* tooltip */
  .tt { position:fixed; z-index:200; background:#1c1c1c; border:1px solid var(--border2); border-radius:6px; padding:5px 11px; font-family:'DM Mono',monospace; font-size:0.72rem; color:var(--text); pointer-events:none; display:none; white-space:nowrap; }

  footer { padding: 1rem 2rem; border-top: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted2); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }

  @media (max-width: 520px) {
    header, .legend-bar, main, footer { padding-left: 1rem; padding-right: 1rem; }
    .row, .axis-row { grid-template-columns: 80px 1fr; gap: 6px; }
    .rlabel { font-size: 0.56rem; }
    .hlabel { font-size: 0.5rem; }
    .bar { height: 28px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>Dostępność <em>Sal</em></h1>
    <p>SCKM — rozkład tygodniowy</p>
  </div>
  <div class="cta-box">
    Widzisz wolne okno? Złóż wniosek rezerwacyjny:<br>
    <a href="https://cal.com/wynajmy.sckm/sale" target="_blank">formularz rezerwacji →</a>
    <small>Każda rezerwacja wymaga akceptacji.</small>
  </div>
</header>

<div class="legend-bar">
  <div class="li"><div class="ldot" style="background:var(--red)"></div>sala zajęta</div>
  <div class="li"><div class="ldot" style="background:var(--green);opacity:0.5"></div>sala wolna</div>
  <span>najedź na blok aby zobaczyć godziny</span>
</div>

<main id="main"></main>

<footer>
  <span>Dane: Zajętość Wszystkich Sal · aktualizacja ręczna</span>
  <span id="fdate"></span>
</footer>

<div class="tt" id="tt"></div>

<script>
// ── DANE ─────────────────────────────────────────────────────────────────────
// Klucze: 0=pon 1=wt 2=śr 3=czw 4=pt 5=sob 6=nd
// Godziny: liczby dziesiętne — 9.5 = 9:30, 16.25 = 16:15
// Aby zmienić plan zajęć — edytuj poniższe tablice i wgraj plik ponownie.
const DATA = {
  baletowa: {
    0: [[16.5, 18]],
    1: [[9.5, 11.5]],
    2: [[9.5, 11.5]],
    3: [[9.5, 11.5]],
    4: [[15.5, 20.5]],
    5: [[11, 12.5]],
    6: [[10, 14]],
  },
  galeria: {
    0: [[9, 11.25]],
    1: [[9, 11.25]],
    2: [[9, 11.25], [16.5, 19]],
    3: [[17.5, 19.75]],
    4: [[10, 11.5]],
    5: [[10, 15.25]],
    6: [],
  },
  gimnastyczna: {
    0: [[15, 16.5]],
    1: [[16.5, 18]],
    2: [[16.5, 20.25]],
    3: [[15, 21]],
    4: [[10, 11.5]],
    5: [[9, 12]],
    6: [[9, 12]],
  },
  teatralna: {
    0: [[9, 12]],
    1: [[9, 12]],
    2: [[9.5, 10.25]],
    3: [[10, 11.5]],
    4: [[10, 11.5]],
    5: [],
    6: [],
  },
  plastyczna: {
    0: [[8, 11], [16.5, 19.5]],
    1: [[8.5, 11.5], [15.5, 19.5]],
    2: [[8.5, 14.5], [15.5, 17.75]],
    3: [[16.5, 20]],
    4: [[15.5, 18]],
    5: [],
    6: [],
  },
};

const ROOMS = [
  { key: 'baletowa',     label: 'Baletowa' },
  { key: 'galeria',      label: 'Galeria 17' },
  { key: 'gimnastyczna', label: 'Gimnastyczna' },
  { key: 'teatralna',    label: 'Teatralna p.78' },
  { key: 'plastyczna',   label: 'Plastyczna 83/84' },
];

const DAYS = [
  { key:0, short:'Pon', full:'Poniedziałek' },
  { key:1, short:'Wt',  full:'Wtorek' },
  { key:2, short:'Śr',  full:'Środa' },
  { key:3, short:'Czw', full:'Czwartek' },
  { key:4, short:'Pt',  full:'Piątek' },
  { key:5, short:'Sob', full:'Sobota' },
  { key:6, short:'Nd',  full:'Niedziela' },
];

// ── HELPERS ───────────────────────────────────────────────────────────────────
const WS = 8, WE = 21;
const SPAN = WE - WS;

function p(h) { return ((h - WS) / SPAN * 100).toFixed(3) + '%'; }
function w(s, e) { return ((e - s) / SPAN * 100).toFixed(3) + '%'; }
function fmt(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return hh + ':' + String(mm).padStart(2, '0');
}
function getFree(busy) {
  const s = [...busy].sort((a,b) => a[0]-b[0]);
  const out = []; let cur = WS;
  for (const [a,b] of s) { if (a > cur+0.15) out.push([cur,a]); cur = Math.max(cur,b); }
  if (cur < WE-0.15) out.push([cur, WE]);
  return out;
}

// ── TICKS (reused) ────────────────────────────────────────────────────────────
let ticksHTML = '';
for (let h = WS+1; h < WE; h++) {
  ticksHTML += `<div class="tick${h%3===0?' tick3':''}" style="left:${p(h)}"></div>`;
}

// ── AXIS (reused) ─────────────────────────────────────────────────────────────
// Build labels at 8,10,12,14,16,18,20 — first/last get special CSS treatment
const axisHours = [];
for (let h = WS; h <= WE; h += 2) axisHours.push(h);
let axisHTML = '';
for (let i = 0; i < axisHours.length; i++) {
  const h = axisHours[i];
  let extra = '';
  if (i === 0) extra = ' style="transform:translateX(0)"';
  else if (i === axisHours.length-1) extra = ' style="transform:translateX(-100%)"';
  axisHTML += `<span class="hlabel"${extra} style="left:${p(h)}">${h}:00</span>`;
}

// ── TOOLTIP ────────────────────────────────────────────────────────────────────
const tt = document.getElementById('tt');
document.addEventListener('mousemove', e => {
  tt.style.left = (e.clientX + 14) + 'px';
  tt.style.top  = (e.clientY - 36) + 'px';
});

// ── RENDER ─────────────────────────────────────────────────────────────────────
const main = document.getElementById('main');
let html = '';

for (const d of DAYS) {
  html += `<div class="day-section">
    <div class="day-heading">
      <span class="day-short">${d.short}</span>
      <span class="day-full">${d.full}</span>
    </div>`;

  for (const r of ROOMS) {
    const busy = DATA[r.key][d.key] || [];
    const free = getFree(busy);

    let segs = ticksHTML;
    for (const [s,e] of free)
      segs += `<div class="fseg" style="left:${p(s)};width:${w(s,e)}"></div>`;
    for (const [s,e] of busy) {
      const label = `${r.label}  ${fmt(s)} – ${fmt(e)}`;
      segs += `<div class="busy" style="left:${p(s)};width:${w(s,e)}"
        onmouseenter="tt.textContent='${label}';tt.style.display='block'"
        onmouseleave="tt.style.display='none'"></div>`;
    }

    html += `<div class="row">
      <div class="rlabel">${r.label}</div>
      <div class="bar">${segs}</div>
    </div>`;
  }

  // one axis per day, aligned with the bar column
  html += `<div class="axis-row">
    <div></div>
    <div class="axis">${axisHTML}</div>
  </div>`;

  html += `</div>`;
}

main.innerHTML = html;
document.getElementById('fdate').textContent =
  'Aktualizacja: ' + new Date().toLocaleDateString('pl-PL', {day:'2-digit', month:'long', year:'numeric'});
</script>
</body>
</html>
